<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Railway Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .booking-card { border-radius: 15px; border: none; transition: 0.3s; margin-bottom: 20px; border-left: 5px solid #0d6efd; }
        .booking-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-confirmed { color: #198754; font-weight: bold; background: #e8f5e9; padding: 4px 10px; border-radius: 20px; }
        .status-cancelled { color: #dc3545; font-weight: bold; background: #ffebee; padding: 4px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-arrow-left me-2"></i> Back to Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold m-0">My Journey History</h3>
        <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
    
    <div id="bookingsList">
        <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
    </div>
</div>



<script>
const API_BASE = "http://localhost:5000";
const token = localStorage.getItem("token");

if(!token) { 
    window.location.href="login.html"; 
}

async function loadBookings() {
    try {
        // ⭐ API Route: /api/users/my-bookings
        const res = await fetch(`${API_BASE}/api/users/my-bookings`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const result = await res.json();
        const list = result.data || [];
        const container = document.getElementById("bookingsList");

        if (list.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-ticket-perforated text-muted" style="font-size: 4rem;"></i>
                    <p class="mt-3 text-muted">No bookings found yet. Start planning your trip!</p>
                    <a href="dashboard.html" class="btn btn-primary">Search Trains</a>
                </div>`;
            return;
        }

        container.innerHTML = list.map(b => `
            <div class="card booking-card shadow-sm p-3">
                <div class="row align-items-center">
                    <div class="col-md-2 text-center">
                        <h6 class="text-muted small mb-1">PNR</h6>
                        <h5 class="fw-bold text-primary mb-0">${b.pnr}</h5>
                    </div>
                    <div class="col-md-4">
                        <h5 class="mb-0 fw-bold">${b.train_name}</h5>
                        <small class="text-muted">${b.source} <i class="bi bi-arrow-right"></i> ${b.destination}</small>
                        <div class="mt-1 small text-secondary">
                            <i class="bi bi-calendar3"></i> ${new Date(b.booking_date || b.created_at).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="col-md-3 text-center">
                        <span class="${b.status === 'CONFIRMED' ? 'status-confirmed' : 'status-cancelled'}">
                            ${b.status}
                        </span>
                        <div class="mt-1 fw-bold">₹${b.total_price}</div>
                    </div>
                    <div class="col-md-3 text-end">
                        <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="downloadTicket('${b.pnr}')">
                            <i class="bi bi-download"></i> Ticket
                        </button>
                    </div>
                </div>
            </div>
        `).join("");
    } catch(err) {
        document.getElementById("bookingsList").innerHTML = `
            <div class="alert alert-danger">Failed to load bookings. Check if server is running!</div>`;
    }
}

function downloadTicket(pnr) {
    // Ticket download route logic
    window.location.href = `${API_BASE}/api/bookings/ticket/${pnr}`;
}

window.onload = loadBookings;
</script>
</body>
</html>
