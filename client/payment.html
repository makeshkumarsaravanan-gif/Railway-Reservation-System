<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment & Summary - SmartRail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .payment-card { border-radius: 24px; border: none; }
        .summary-item { border-bottom: 1px dashed #e2e8f0; }
        .passenger-badge { 
            background: #f1f5f9; 
            border: 1px solid #e2e8f0;
            font-size: 0.8rem;
        }
        .btn-payment {
            border: 1.5px solid #e2e8f0;
            transition: all 0.3s ease;
            background: white;
        }
        .btn-payment:hover {
            border-color: #4338ca;
            background: #f5f3ff;
            transform: translateY(-2px);
        }
        .success-animation {
            font-size: 80px;
            animation: scaleUp 0.5s ease;
        }
        @keyframes scaleUp {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom shadow-sm mb-4 py-3">
    <div class="container">
        <span class="navbar-brand fw-bold text-primary" onclick="location.href='dashboard.html'" style="cursor:pointer">
            <i class="bi bi-shield-lock-fill me-2"></i>Secure Checkout
        </span>
        <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-2">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            
            <div class="card payment-card shadow-lg overflow-hidden mb-5" id="mainCard">
                <div class="card-header border-0 p-4 text-center bg-primary text-white" id="headerTitle">
                    <h5 class="fw-bold mb-0">Review Your Journey</h5>
                </div>

                <div class="card-body p-4 p-md-5">
                    <div id="bookingSummary">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-3 text-muted fw-semibold">Preparing your summary...</p>
                        </div>
                    </div>

                    <div id="paymentSection" class="mt-5">
                        <div class="text-center mb-4">
                            <span class="badge bg-light text-muted border px-3 py-2 rounded-pill fw-bold small text-uppercase">Select Payment Method</span>
                        </div>
                        
                        <div class="row g-3">
                            <div class="col-4">
                                <button class="btn btn-payment w-100 py-3 rounded-4 shadow-sm" onclick="processPayment('UPI')">
                                    <div class="fs-4 mb-1">📲</div>
                                    <div class="small fw-bold">UPI</div>
                                </button>
                            </div>
                            <div class="col-4">
                                <button class="btn btn-payment w-100 py-3 rounded-4 shadow-sm" onclick="processPayment('Card')">
                                    <div class="fs-4 mb-1">💳</div>
                                    <div class="small fw-bold">CARD</div>
                                </button>
                            </div>
                            <div class="col-4">
                                <button class="btn btn-payment w-100 py-3 rounded-4 shadow-sm" onclick="processPayment('Net Banking')">
                                    <div class="fs-4 mb-1">🌐</div>
                                    <div class="small fw-bold">BANK</div>
                                </button>
                            </div>
                        </div>
                        
                        <p class="text-center text-muted mt-4 mb-0" style="font-size: 0.75rem;">
                            <i class="bi bi-lock-fill me-1"></i> Your transaction is encrypted and secure.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem("token");
const bookingData = JSON.parse(localStorage.getItem("bookingData"));

if (!token || !bookingData) {
    alert("Session expired! Please login again.");
    window.location.href = "login.html";
}

async function loadSummary() {
    try {
        const res = await fetch(`${API_BASE}/api/trains/${bookingData.train_id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const result = await res.json();
        const train = Array.isArray(result) ? result[0] : (result.data || result);
        
        if (!train) throw new Error("Train details not found");

        const summaryDiv = document.getElementById("bookingSummary");
        const fare = bookingData.total_price || (bookingData.seats * (train.price || 0));

        summaryDiv.innerHTML = `
            <div class="bg-primary bg-opacity-10 rounded-4 p-4 border border-primary border-opacity-25 mb-4">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h4 class="fw-bold text-primary mb-1">🚂 ${train.train_name}</h4>
                        <div class="d-flex align-items-center text-secondary small fw-bold">
                            <span>${train.source}</span>
                            <i class="bi bi-arrow-right mx-2 text-primary"></i>
                            <span>${train.destination}</span>
                        </div>
                    </div>
                    <span class="badge bg-primary rounded-pill px-3 py-2">Confirmed Route</span>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-6">
                    <div class="summary-item pb-3">
                        <div class="text-muted small fw-bold text-uppercase">Seats</div>
                        <div class="fw-black fs-5 text-dark">${bookingData.seat_numbers.join(", ")}</div>
                    </div>
                </div>
                <div class="col-6 text-end">
                    <div class="summary-item pb-3">
                        <div class="text-muted small fw-bold text-uppercase">Passengers</div>
                        <div class="fw-black fs-5 text-dark">${bookingData.seats} Adult(s)</div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="text-muted small fw-bold text-uppercase mb-2 d-block">Traveler Information</label>
                <div class="d-flex flex-wrap gap-2">
                    ${bookingData.passengers.map(p => `
                        <div class="passenger-badge rounded-3 px-3 py-2 d-flex align-items-center">
                            <i class="bi bi-person-fill me-2 text-primary"></i>
                            <span>${p.name} <small class="text-muted fw-bold">(${p.age})</small></span>
                        </div>
                    `).join("")}
                </div>
            </div>

            <div class="card border-0 bg-dark text-white rounded-4 p-4 shadow-sm mt-5">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="small opacity-75 fw-bold text-uppercase">Total Amount Payable</div>
                        <div class="fs-6 opacity-50 small mt-n1">Including all service charges</div>
                    </div>
                    <div class="text-end">
                        <div class="display-6 fw-bold text-warning">₹${fare}</div>
                    </div>
                </div>
            </div>
        `;
    } catch (err) {
        summaryDiv.innerHTML = `
            <div class="alert alert-danger border-0 rounded-4 py-4 text-center">
                <i class="bi bi-exclamation-triangle-fill fs-3 d-block mb-2"></i>
                <h6 class="fw-bold mb-1">Connection Error</h6>
                <p class="small mb-0 opacity-75">Could not fetch train details. Please check server.</p>
            </div>`;
    }
}

async function processPayment(method) {
    const paySection = document.getElementById("paymentSection");
    const originalContent = paySection.innerHTML;
    
    paySection.innerHTML = `
        <div class="text-center py-4">
            <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
            <h5 class="mt-3 fw-bold mb-1">Processing ${method} Payment</h5>
            <p class="text-muted small">Please do not close or refresh this window...</p>
        </div>`;

    try {
        const response = await fetch(`${API_BASE}/api/bookings/book`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({
                ...bookingData,
                paymentMethod: method,
                status: "Success"
            })
        });

        const result = await response.json();

        if (response.ok) {
            document.getElementById("headerTitle").innerText = "Payment Successful";
            document.getElementById("headerTitle").classList.replace("bg-primary", "bg-success");
            
            document.getElementById("mainCard").innerHTML = `
                <div class="card-body text-center py-5 px-4 px-md-5">
                    <div class="success-animation text-success mb-4">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h2 class="fw-black text-dark mb-2">Ticket Booked!</h2>
                    <p class="text-muted mb-4">Your journey has been confirmed. Get ready for travel!</p>
                    
                    <div class="bg-primary bg-opacity-10 p-4 rounded-4 mb-4 border border-primary border-opacity-10 position-relative overflow-hidden ticket-style">
                        <div class="text-primary small fw-bold text-uppercase ls-1 mb-1">PNR NUMBER</div>
                        <h1 class="display-4 fw-black text-primary mb-0" style="letter-spacing: 2px;">${result.pnr || 'N/A'}</h1>
                    </div>
                    
                    <div class="row g-3">
                        <div class="col-md-6 text-md-start">
                            <a href="${API_BASE}/api/bookings/ticket/${result.pnr}" target="_blank" class="btn btn-success btn-lg w-100 py-3 rounded-pill fw-bold shadow">
                                <i class="bi bi-download me-2"></i>E-Ticket
                            </a>
                        </div>
                        <div class="col-md-6 text-md-end">
                            <a href="my-bookings.html" class="btn btn-outline-dark btn-lg w-100 py-3 rounded-pill fw-bold">
                                <i class="bi bi-list-check me-2"></i>My Bookings
                            </a>
                        </div>
                    </div>
                    
                    <button onclick="location.href='dashboard.html'" class="btn btn-link text-decoration-none text-muted mt-4 fw-bold">
                        <i class="bi bi-house-door"></i> Back to Dashboard
                    </button>
                </div>
            `;
            localStorage.removeItem("bookingData");
            localStorage.removeItem("selected_train");
        } else {
            alert("❌ Payment Failed: " + (result.message || "Unknown Error"));
            paySection.innerHTML = originalContent;
        }
    } catch (err) {
        alert("Server connection failed!");
        paySection.innerHTML = originalContent;
    }
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

loadSummary();
</script>
</body>
</html>
