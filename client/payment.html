<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment & Summary - Railway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 600px; }
        .card { border-radius: 15px; border: none; overflow: hidden; }
        .card-header { background: #0d6efd; color: white; text-align: center; padding: 20px; font-weight: bold; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .passenger-chip { background: #e9ecef; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; display: inline-block; margin: 4px; border: 1px solid #dee2e6; }
        .payment-btn { transition: 0.3s; font-weight: bold; padding: 12px; border-radius: 10px; }
        .payment-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .success-icon { font-size: 60px; color: #198754; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold" onclick="location.href='dashboard.html'" style="cursor:pointer">🚂 Payment Gateway</span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-2">
    <div class="card shadow-lg mb-5" id="mainCard">
        <div class="card-header" id="headerTitle" style="background: #0d6efd;">Review Your Journey</div>
        <div class="card-body p-4">
            <div id="bookingSummary">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2 text-muted">Fetching booking summary...</p>
                </div>
            </div>

            <div id="paymentSection" class="mt-4">
                <hr>
                <h5 class="mb-4 fw-bold text-center">Select Payment Method</h5>
                <div class="row g-2">
                    <div class="col-md-4">
                        <button class="btn btn-primary payment-btn w-100" onclick="processPayment('UPI')">📲 UPI</button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-success payment-btn w-100" onclick="processPayment('Card')">💳 Card</button>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-warning payment-btn w-100 text-dark" onclick="processPayment('Net Banking')">🌐 Bank</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ⭐ FIX: DYNAMIC API URL (Mobile & Laptop) ⭐
const API_BASE = window.location.origin;

const token = localStorage.getItem("token");
const bookingData = JSON.parse(localStorage.getItem("bookingData"));

if (!token || !bookingData) {
    alert("Session expired! Please login again.");
    window.location.href = "login.html";
}

async function loadSummary() {
    try {
        const res = await fetch(`${API_BASE}/api/trains/${bookingData.train_id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const result = await res.json();
        const train = Array.isArray(result) ? result[0] : (result.data || result);
        
        if (!train) throw new Error("Train details not found");

        const summaryDiv = document.getElementById("bookingSummary");
        const fare = bookingData.total_price || (bookingData.seats * (train.price || 0));

        summaryDiv.innerHTML = `
            <div class="alert alert-primary py-3 border-0 rounded-3 mb-4">
                <h5 class="mb-1 fw-bold">🚂 ${train.train_name}</h5>
                <small>${train.source} ➔ ${train.destination}</small>
            </div>
            <div class="summary-item"><span>Total Passengers:</span> <strong>${bookingData.seats}</strong></div>
            <div class="summary-item"><span>Seat Numbers:</span> <strong class="text-primary">${bookingData.seat_numbers.join(", ")}</strong></div>
            <div class="mt-4 mb-2 fw-bold text-muted small uppercase">Passenger Details</div>
            <div class="mb-4">
                ${bookingData.passengers.map(p => `<span class="passenger-chip">👤 ${p.name} (${p.age})</span>`).join("")}
            </div>
            <hr>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="fs-5 fw-bold">Amount Payable:</span>
                <span class="fs-4 text-success fw-bold">₹${fare}</span>
            </div>
        `;
    } catch (err) {
        console.error("Summary error:", err);
        document.getElementById("bookingSummary").innerHTML = `
            <div class="alert alert-danger text-center">
                ⚠️ Connection Error! <br> 
                Server run aagudha-nu check pannunga.
            </div>`;
    }
}

async function processPayment(method) {
    const paySection = document.getElementById("paymentSection");
    const originalContent = paySection.innerHTML;
    
    paySection.innerHTML = `
        <div class="text-center py-3">
            <div class="spinner-grow text-success" role="status"></div>
            <p class="mt-2 fw-bold">Verifying ${method} Payment...</p>
        </div>`;

    try {
        const response = await fetch(`${API_BASE}/api/bookings/book`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({
                ...bookingData,
                paymentMethod: method,
                status: "Success"
            })
        });

        const result = await response.json();

        if (response.ok) {
            document.getElementById("headerTitle").innerText = "Success!";
            document.getElementById("headerTitle").style.background = "#198754";
            
            // ⭐ SUCCESS SCREEN ⭐
            document.getElementById("mainCard").innerHTML = `
                <div class="card-body text-center py-5">
                    <div class="success-icon">✅</div>
                    <h2 class="fw-bold mb-3">Booking Confirmed!</h2>
                    <div class="bg-light p-4 rounded-4 mb-4 border border-success border-opacity-25">
                        <p class="mb-1 text-muted fw-bold small">PNR NUMBER</p>
                        <h1 class="display-4 fw-bold text-primary mb-0">${result.pnr || 'N/A'}</h1>
                    </div>
                    <div class="d-grid gap-3 mt-4">
                        <a href="${API_BASE}/api/bookings/ticket/${result.pnr}" target="_blank" class="btn btn-success btn-lg fw-bold rounded-pill">📥 Download E-Ticket</a>
                        <a href="my-bookings.html" class="btn btn-outline-primary btn-lg rounded-pill">📋 My Bookings</a>
                    </div>
                </div>
            `;
            localStorage.removeItem("bookingData");
            localStorage.removeItem("selected_train");
        } else {
            alert("❌ Payment Failed: " + (result.message || "Unknown Error"));
            paySection.innerHTML = originalContent;
        }
    } catch (err) {
        console.error("Payment error:", err);
        alert("Server connection failed!");
        paySection.innerHTML = originalContent;
    }
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

loadSummary();
</script>
</body>
</html>
