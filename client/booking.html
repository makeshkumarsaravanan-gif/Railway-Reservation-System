<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Seat Booking - Railway Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 900px; }
        .hidden { display: none; }
        
        /* Coach Layout */
        .coach-container { background: #dfe6e9; padding: 20px; border: 3px solid #636e72; border-radius: 10px; max-width: 650px; margin: 0 auto; overflow-x: auto; }
        .compartment { display: flex; justify-content: space-between; background: #fff; margin-bottom: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid #0984e3; min-width: 550px; }
        .main-berths { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 50px); gap: 10px; }
        .side-berths { display: grid; grid-template-rows: repeat(2, 50px); gap: 10px; margin-left: 40px; border-left: 2px dashed #ccc; padding-left: 20px; }
        
        /* Seat Styling */
        .seat { width: 60px; height: 50px; background: #fff; border: 2px solid #0984e3; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .seat span { font-size: 9px; color: #636e72; }
        
        .selected { background: #0984e3 !important; color: white !important; } 
        .booked { background: #fab1a0 !important; border-color: #ff7675 !important; color: #d63031 !important; cursor: not-allowed; opacity: 0.7; }
        
        .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; border-radius: 3px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container mt-4 mb-5">
    <div class="card shadow-sm p-3 mb-4 border-0">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h4 id="trainInfo" class="mb-1 text-primary text-uppercase fw-bold"><i class="bi bi-train-front"></i> Loading...</h4>
                <p id="priceInfo" class="text-muted mb-0 fw-semibold">Fare: ₹0</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" onclick="window.location.href='dashboard.html'">Back</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div id="seatSelection" class="card shadow p-4 border-0 rounded-4">
        <h5 class="text-center mb-3">Select Your Berths (Max 4)</h5>
        <div class="legend">
            <div class="legend-item"><div class="box bg-white border-primary"></div> Available</div>
            <div class="legend-item"><div class="box" style="background: #fab1a0;"></div> Booked</div>
            <div class="legend-item"><div class="box bg-primary"></div> Selected</div>
        </div>

        <div class="coach-container" id="coachBody">
            <div class="text-center p-5"><div class="spinner-border text-primary"></div></div>
        </div>
        
        <div class="text-center mt-4">
            <h4 id="selectedCount" class="mb-4">Berths: 0 | Total: ₹0</h4>
            <button class="btn btn-primary btn-lg w-100 shadow fw-bold" onclick="goToPassengerDetails()">Confirm & Add Passengers</button>
        </div>
    </div>

    <div id="passengerDetails" class="card shadow p-4 hidden border-0 rounded-4">
        <h5 class="mb-4 text-center fw-bold text-primary">Passenger Information</h5>
        <div id="passengerForm"></div>
        <div class="alert alert-warning mt-3 py-2 small">Note: OTP verification is required for security.</div>
        <div class="d-flex gap-3 mt-4">
            <button class="btn btn-outline-secondary w-50" onclick="location.reload()">Reset</button>
            <button id="verifyBtn" class="btn btn-success w-50 fw-bold" onclick="verifyAndProceed()">Verify & Pay</button>
        </div>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ⭐ FIXED TO LOCALHOST ⭐
const API_BASE = "http://localhost:5000"; 
const token = localStorage.getItem("token");
const trainId = localStorage.getItem("selected_train");
const userId = localStorage.getItem("user_id");

let selectedSeats = [], seatPrice = 0;

if (!token || !trainId) { window.location.href="login.html"; }

async function loadTrainInfo() {
    try {
        const res = await fetch(`${API_BASE}/api/trains/${trainId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await res.json();
        // Backend data structure handle panrom
        let train = Array.isArray(result) ? result[0] : (result.data ? result.data : result);
        
        if (train) {
            document.getElementById("trainInfo").innerText = "🚂 " + train.train_name;
            seatPrice = train.price;
            document.getElementById("priceInfo").innerText = `Fare: ₹${seatPrice} / berth`;
            loadSeats(); 
        }
    } catch(err) { 
        console.error("Error loading train:", err); 
        document.getElementById("trainInfo").innerText = "Connection Error!";
    }
}

async function loadSeats() {
    try {
        const res = await fetch(`${API_BASE}/api/bookings/booked/${trainId}`);
        const data = await res.json();
        const booked = data.bookedSeats || [];
        const coach = document.getElementById("coachBody");
        coach.innerHTML = "";
        
        let seatNum = 1;
        const berthTypes = ["LB", "MB", "UB", "LB", "MB", "UB", "SL", "SU"];
        
        // Let's create 5 compartments (40 seats)
        for (let i = 0; i < 5; i++) {
            const comp = document.createElement("div");
            comp.className = "compartment shadow-sm";
            const main = document.createElement("div");
            main.className = "main-berths";
            for (let j = 0; j < 6; j++) createSeat(seatNum++, berthTypes[j], main, booked);
            const side = document.createElement("div");
            side.className = "side-berths";
            for (let k = 6; k < 8; k++) createSeat(seatNum++, berthTypes[k], side, booked);
            comp.append(main, side);
            coach.appendChild(comp);
        }
    } catch(err) { console.error("Error loading seats:", err); }
}

function createSeat(num, type, parent, booked) {
    const seat = document.createElement("div");
    const sStr = num.toString();
    const isBooked = booked.some(b => b.toString() === sStr);
    
    seat.className = isBooked ? "seat booked" : "seat";
    seat.innerHTML = `${num}<span>${type}</span>`;
    
    if (!isBooked) {
        seat.onclick = () => {
            if (seat.classList.contains("selected")) {
                seat.classList.remove("selected");
                selectedSeats = selectedSeats.filter(s => s !== sStr);
            } else {
                if (selectedSeats.length >= 4) return alert("Oru time-ku 4 seats mattum dhaan allowed!");
                seat.classList.add("selected");
                selectedSeats.push(sStr);
            }
            document.getElementById("selectedCount").innerText = `Berths: ${selectedSeats.length} | Total: ₹${selectedSeats.length * seatPrice}`;
        };
    }
    parent.appendChild(seat);
}

function goToPassengerDetails() {
    if(selectedSeats.length === 0) return alert("Berth select pannunga!");
    document.getElementById("seatSelection").classList.add("hidden");
    document.getElementById("passengerDetails").classList.remove("hidden");
    
    const formContainer = document.getElementById("passengerForm");
    formContainer.innerHTML = selectedSeats.map((s, i) => `
        <div class="p-3 border rounded-3 mb-3 bg-white shadow-sm border-primary-subtle">
            <h6 class="text-primary fw-bold">Passenger for Berth #${s}</h6>
            <div class="row g-2 mt-2">
                <div class="col-md-4"><input type="text" class="form-control" placeholder="Name" id="name_${i}" required></div>
                <div class="col-md-2"><input type="number" class="form-control" placeholder="Age" id="age_${i}" required></div>
                <div class="col-md-2"><select class="form-select" id="gender_${i}"><option value="Male">Male</option><option value="Female">Female</option></select></div>
                <div class="col-md-4"><input type="email" class="form-control" placeholder="Email" id="email_${i}" required></div>
            </div>
        </div>`).join("");
}

async function verifyAndProceed() {
    const firstEmail = document.getElementById('email_0').value;
    if (!firstEmail) return alert("Email address mukkiyam!");

    const btn = document.getElementById("verifyBtn");
    btn.disabled = true;
    btn.innerText = "Sending OTP...";

    try {
        const res = await fetch(`${API_BASE}/api/bookings/send-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: firstEmail })
        });
        const data = await res.json();

        if (data.success) {
            const userOtp = prompt(`OTP sent to ${firstEmail}. Enter it here:`);
            if (userOtp == data.otp) {
                alert("✅ Verification Successful!");
                saveBookingData();
            } else {
                alert("❌ Wrong OTP! Try again.");
                btn.disabled = false;
                btn.innerText = "Verify & Pay";
            }
        } else {
            alert("❌ OTP send fail aayiduchi. Check server.");
            btn.disabled = false;
            btn.innerText = "Verify & Pay";
        }
    } catch (err) { 
        alert("❌ Server Connection Fail! Terminal check pannunga."); 
        btn.disabled = false; 
        btn.innerText = "Verify & Pay";
    }
}

function saveBookingData() {
    const passengers = selectedSeats.map((s, i) => ({
        name: document.getElementById(`name_${i}`).value,
        age: document.getElementById(`age_${i}`).value,
        gender: document.getElementById(`gender_${i}`).value,
        email: document.getElementById(`email_${i}`).value,
        seat_number: s
    }));

    const bookingData = {
        user_id: userId,
        train_id: trainId,
        seats: selectedSeats.length,
        seat_numbers: selectedSeats,
        passengers: passengers,
        total_price: selectedSeats.length * seatPrice
    };

    localStorage.setItem("bookingData", JSON.stringify(bookingData));
    window.location.href = "payment.html";
}

function logout() { localStorage.clear(); window.location.href = "index.html"; }
loadTrainInfo();
</script>
</body>
</html>
