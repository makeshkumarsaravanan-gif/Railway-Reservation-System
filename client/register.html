<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Railway Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            width: 420px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: none;
        }
        h3 {
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
        }
        .btn-success {
            border-radius: 8px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
            background-color: #1cc88a;
            border: none;
        }
        .btn-success:hover { background-color: #17a673; transform: translateY(-2px); }
        .back-home { font-size: 0.9rem; margin-bottom: 15px; display: block; text-decoration: none; color: #666; }
        .back-home:hover { color: #4e73df; }
    </style>
</head>
<body>

<div class="card bg-white shadow-lg">
    <a href="index.html" class="back-home">← Back to Home</a>
    <h3>Create Account</h3>
    <form id="registerForm">
        <div class="mb-3">
            <label class="form-label small">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
            <label class="form-label small">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label small">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required>
        </div>
        <button type="button" id="regBtn" class="btn btn-success mt-2" onclick="register()">Register Now</button>
    </form>
    <p class="text-center mt-4">
        Already have an account? <a href="login.html" class="text-decoration-none fw-bold">Login here</a>
    </p>
</div>



<script>
// ⭐ FIXED TO LOCALHOST ⭐
const API_BASE = "http://localhost:5000";

// Already login aagi irundha dashboard-ku anupidu
window.onload = () => {
    if(localStorage.getItem("token")) {
        window.location.href = "dashboard.html";
    }
};

async function register() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const regBtn = document.getElementById("regBtn");

    if (!name || !email || !password) {
        alert("⚠️ Ella details-um fill pannunga.");
        return;
    }

    if (password.length < 6) {
        alert("⚠️ Password min 6 characters irukanum.");
        return;
    }

    regBtn.innerText = "Processing...";
    regBtn.disabled = true;

    try {
        // Localhost backend-ku register request anupudhu
        const response = await fetch(`${API_BASE}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok || data.success) {
            alert("✅ Registration Success! Ippo login pannunga.");
            window.location.href = "login.html";
        } else {
            alert("❌ Registration Failed: " + (data.message || "Email already exists?"));
        }
    } catch (err) {
        console.error("Fetch Error:", err);
        alert("❌ Server Connection Fail! Terminal-la 'node app.js' run aagudhaa-nu check pannunga.");
    } finally {
        regBtn.innerText = "Register Now";
        regBtn.disabled = false;
    }
}
</script>

</body>
</html>
