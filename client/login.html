<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Railway Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #4e73df, #1cc88a); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .card { max-width: 400px; width: 100%; border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card-body { padding: 40px; background: #fff; border-radius: 15px; }
        .form-control { border-radius: 8px; padding: 12px; }
        .btn-primary { border-radius: 8px; padding: 12px; font-weight: bold; background-color: #4e73df; border: none; }
        .btn-primary:hover { background-color: #2e59d9; transform: translateY(-2px); transition: 0.3s; }
    </style>
</head>
<body>

<div class="card shadow-lg">
    <div class="card-body">
        <h3 class="text-center mb-4">User Login</h3>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button id="loginBtn" class="btn btn-primary w-100 mt-2" onclick="login()">Login</button>

        <p class="mt-4 text-center">
            Don't have an account? <a href="register.html" class="text-decoration-none">Register here</a>
        </p>
    </div>
</div>



<script>
async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const loginBtn = document.getElementById("loginBtn");

    if (!email || !password) {
        alert("Email and Password type pannunga!");
        return;
    }

    loginBtn.innerText = "Connecting...";
    loginBtn.disabled = true;

    try {
        // ⭐ STRICTLY LOCALHOST ⭐
        const response = await fetch("http://localhost:5000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.token) {
            // Data Save for Profile/Dashboard
            localStorage.setItem("token", data.token);
            
            // Backend data structure-ku thaguntha maari save panrom
            const userObj = data.user || {};
            localStorage.setItem("user_id", data.user_id || userObj.id);
            localStorage.setItem("user_name", data.user_name || userObj.name || "Railway User");
            localStorage.setItem("user_email", data.user_email || userObj.email || email);

            alert("✅ Success! Localhost-la Login aayiduchi.");
            window.location.href = "dashboard.html"; 
        } else {
            alert("❌ " + (data.message || "Invalid Email or Password"));
        }
    } catch (err) {
        console.error("Login Error:", err);
        alert("❌ Error: Server (Node.js) run aagala! Terminal-la 'node app.js' kuduthurukeengala-nu paarunga.");
    } finally {
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
}

// Already login aagi irundha direct-ah dashboard-ku poga:
window.onload = () => {
    if(localStorage.getItem("token")) {
        window.location.href = "dashboard.html";
    }
};
</script>

</body>
</html>
