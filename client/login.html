<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Railway Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #4e73df, #1cc88a); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .card { max-width: 400px; width: 100%; border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card-body { padding: 40px; background: #fff; border-radius: 15px; }
        .form-control { border-radius: 8px; padding: 12px; }
        .btn-primary { border-radius: 8px; padding: 12px; font-weight: bold; background-color: #4e73df; border: none; }
        .btn-primary:hover { background-color: #2e59d9; transform: translateY(-2px); transition: 0.3s; }
    </style>
</head>
<body>

<div class="card shadow-lg">
    <div class="card-body">
        <h3 class="text-center mb-4 text-primary fw-bold">User Login</h3>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button id="loginBtn" class="btn btn-primary w-100 mt-2 shadow" onclick="login()">Login</button>

        <p class="mt-4 text-center">
            Don't have an account? <a href="register.html" class="text-decoration-none fw-bold">Register here</a>
        </p>
    </div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const loginBtn = document.getElementById("loginBtn");

    if (!email || !password) {
        alert("Email and Password type pannunga!");
        return;
    }

    loginBtn.innerText = "Connecting...";
    loginBtn.disabled = true;

    // Dynamic URL: Mobile/Laptop rendu edathulayum work aagum
    const API_BASE_URL = window.location.origin; 

    try {
        const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.token) {
            // ⭐ LOCALSTORAGE DATA STORAGE FIX ⭐
            localStorage.setItem("token", data.token);
            
            // Backend-la 'user' object-kulla thaan data varuthu
            if (data.user) {
                localStorage.setItem("user_id", data.user.id);
                localStorage.setItem("user_name", data.user.name);
                localStorage.setItem("user_email", data.user.email);
            }

            alert("✅ Login Successful!");
            window.location.href = "dashboard.html"; 
        } else {
            alert("❌ " + (data.message || "Invalid Email or Password"));
        }
    } catch (err) {
        console.error("Login Error:", err);
        alert("❌ Connection Error! Server run aaguranu check pannunga.");
    } finally {
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
}

// Check if already logged in
window.onload = () => {
    if(localStorage.getItem("token")) {
        window.location.href = "dashboard.html";
    }
};
</script>

</body>
</html>
