<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Railway Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .profile-container { max-width: 450px; margin: 30px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; }
        .user-icon { font-size: 4.5rem; color: #0d6efd; }
        .section-box { background: #ffffff; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; margin-bottom: 15px; }
        .btn-custom { padding: 12px; font-weight: 600; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #securitySection { background: #fff9e6; border-color: #ffeeba; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-container">
        <div class="header">
            <div class="user-icon"><i class="bi bi-person-circle"></i></div>
            <h4 id="displayUserName" class="fw-bold mt-2">Loading...</h4>
            <p id="displayUserEmail" class="text-muted small">...</p>
        </div>

        <div id="securitySection" class="section-box">
            <h6 class="fw-bold text-dark mb-3"><i class="bi bi-shield-lock"></i> Security Settings</h6>
            
            <div id="otpStep">
                <p class="small text-muted">Password maathuna OTP verify pannanum.</p>
                <button id="sendOtpBtn" class="btn btn-warning w-100 fw-bold mb-2" onclick="sendOTP()">
                    Send OTP to Email
                </button>
            </div>

            <div id="passwordStep" class="hidden">
                <div class="alert alert-info small py-2">OTP Sent! Adhai inge enter pannunga.</div>
                <input type="text" id="otpInput" class="form-control mb-2" placeholder="Enter 4-Digit OTP">
                <hr>
                <input type="password" id="newPass" class="form-control mb-2" placeholder="New Password">
                <input type="password" id="confirmPass" class="form-control mb-3" placeholder="Confirm New Password">
                
                <button id="updateBtn" class="btn btn-success w-100 fw-bold" onclick="verifyAndChange()">
                    Verify & Update Password
                </button>
            </div>
        </div>

        <div class="section-box">
            <h6 class="fw-bold text-primary mb-3">Quick Actions</h6>
            <button class="btn btn-primary w-100 btn-custom shadow-sm" onclick="window.location.href='my-bookings.html'">
                <i class="bi bi-ticket-perforated"></i> My Bookings
            </button>
        </div>

        <button class="btn btn-danger w-100 btn-custom shadow-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </div>
</div>

<script>
    // ⭐ DYNAMIC API BASE ⭐
    const API_BASE = window.location.origin; 
    const token = localStorage.getItem("token");
    const userEmail = localStorage.getItem("user_email");
    const userId = localStorage.getItem("user_id");

    let serverOTP = ""; // OTP-ah store panna

    document.getElementById("displayUserName").innerText = localStorage.getItem("user_name") || "Railway User";
    document.getElementById("displayUserEmail").innerText = userEmail || "Email Not Found";

    // 1. Send OTP Function
    async function sendOTP() {
        if(!userEmail) return alert("User email kidaikala!");

        const btn = document.getElementById("sendOtpBtn");
        btn.disabled = true;
        btn.innerText = "Sending...";

        try {
            const res = await fetch(`${API_BASE}/api/bookings/send-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail })
            });

            const data = await res.json();
            if (data.success) {
                serverOTP = data.otp; // Backend-la irundhu vara OTP
                alert("✅ OTP unga email-ku anupiyaachu!");
                document.getElementById("otpStep").classList.add("hidden");
                document.getElementById("passwordStep").classList.remove("hidden");
            } else {
                alert("❌ OTP anupa mudiyala!");
                btn.disabled = false;
                btn.innerText = "Send OTP to Email";
            }
        } catch (err) {
            alert("❌ Server connection error!");
            btn.disabled = false;
        }
    }

    // 2. Verify OTP and Change Password
    async function verifyAndChange() {
        const userEnteredOtp = document.getElementById("otpInput").value;
        const newPass = document.getElementById("newPass").value;
        const confirmPass = document.getElementById("confirmPass").value;

        if(!userEnteredOtp) return alert("OTP type pannunga!");
        if(userEnteredOtp != serverOTP) return alert("❌ Thappana OTP!");
        if(newPass.length < 6) return alert("Password min 6 characters irukanum!");
        if(newPass !== confirmPass) return alert("Passwords match aagala!");

        const btn = document.getElementById("updateBtn");
        btn.disabled = true;
        btn.innerText = "Updating...";

        try {
            // Backend-la intha route (/api/auth/reset-password) irukanum
            const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ userId, newPass })
            });

            if (res.ok) {
                alert("✅ Password successfully changed!");
                location.reload();
            } else {
                alert("❌ Update failed! Try again.");
                btn.disabled = false;
            }
        } catch (err) {
            alert("❌ Server Error!");
            btn.disabled = false;
        }
    }

    function logout() { 
        localStorage.clear(); 
        window.location.href = "index.html"; 
    }
</script>
</body>
</html>
